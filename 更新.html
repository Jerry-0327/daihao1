<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏规则</title>
    <style>
		#yx, #zy, #zjm,#lsjl{
        background: rgba(255,255,255,0.9);
