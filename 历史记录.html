<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史记录</title>
    <style>
        /* ===== 原有样式（未做任何修改） ===== */
        #lsjl {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 20px;
            margin: 15px 0;
            border: 1px solid #eee;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        .bu {
            padding: 5px 10px;
            font-size: 8px;
            cursor: pointer;
        }

        .login-btn {
            background: linear-gradient(45deg, #00a3ff, #0066ff);
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        /* ===== 新增：筛选控件样式（不影响任何原有样式） ===== */
        .filter-area {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
            margin: 10px 0 15px 0;
            padding: 12px 16px;
            background: rgba(240, 248, 255, 0.7);
            border-radius: 8px;
            border: 1px solid #e0e8f0;
        }
        .filter-area select,
        .filter-area input {
            padding: 6px 12px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
            font-family: Arial, sans-serif;
            background: white;
            outline: none;
            min-width: 100px;
        }
        .filter-area select:focus,
        .filter-area input:focus {
            border-color: #0066ff;
            box-shadow: 0 0 0 2px rgba(0, 102, 255, 0.15);
        }
        .filter-area input {
            min-width: 140px;
        }
        .filter-btn {
            padding: 6px 20px;
            background: linear-gradient(45deg, #00a3ff, #0066ff);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-family: Arial, sans-serif;
            transition: opacity 0.2s;
        }
        .filter-btn:hover {
            opacity: 0.85;
        }
        .filter-reset-btn {
            padding: 6px 20px;
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-family: Arial, sans-serif;
            transition: background 0.2s;
        }
        .filter-reset-btn:hover {
            background: #e0e0e0;
        }
        .filter-label {
            font-size: 14px;
            color: #555;
            font-weight: bold;
            margin-right: 2px;
        }
        .filter-stats {
            font-size: 13px;
            color: #888;
            margin-left: 6px;
        }

        /* 让表格更美观（不改变原有样式，仅对表格内容做微调） */
        #tableContainer table {
            border-collapse: collapse;
            width: 100%;
            font-size: 14px;
        }
        #tableContainer th {
            background: #f0f6ff;
            font-weight: bold;
            padding: 8px;
        }
        #tableContainer td {
            padding: 6px 8px;
        }
        #tableContainer tr:nth-child(even) {
            background: #fafcff;
        }

        /* ===== 新增：胜率显示样式 ===== */
        #shenglv {
            margin: 6px 0 0 0;
            font-size: 15px;
            color: #1a3c6e;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        /* ===== 新增样式结束 ===== */
    </style>
</head>
<body>
    <h1>☠️代号一☠️</h1>

    <div id="lsjl">
        <p id="sjjjj" style="display: inline-block; width: 400px;"></p>
        <!--<button onclick="removeItem()" class="bu">清除</button>-->

        <!-- ===== 新增：胜率显示（位于统计信息下方） ===== -->
        <p id="shenglv">当前模式胜率: 0% (0/0)</p>

        <!-- ===== 修改后的筛选区：只保留模式 ===== -->
        <div class="filter-area" id="filterArea">
            <span class="filter-label">模式</span>
            <select id="filterMode">
                <option value="">全部</option>
            </select>
            <span class="filter-stats" id="filterStats">共 0 条</span>
        </div>

        <div id="tableContainer"></div>
        <p></p>
        <button onclick="fh()" class="login-btn">返回</button>
    </div>

    <script>
        // ===== 原有全局变量 =====
        var zong1 = Number(localStorage.getItem('zong1'));
        var ying1 = Number(localStorage.getItem('ying1'));
        var cz1 = Number(localStorage.getItem('cz1'));
        var lsjlbg1 = JSON.parse(localStorage.getItem('lsjlbg1')) || [];

        // ===== 新增：用于筛选的数据副本 =====
        var allData = []; // 原始数据（只读）
        var filteredData = []; // 筛选后的数据

        // ===== 原有函数（未修改） =====
        function removeItem() {
            localStorage.removeItem('zong1');
            localStorage.removeItem('ying1');
            localStorage.removeItem('cz1');
            localStorage.removeItem('lsjlbg1');
            window.location.href = "历史记录.html";
        }

        function fh() {
            window.location.href = "主页.html";
        }

        // ===== 新增：渲染表格（支持传入数据） =====
        function renderTable(data) {
            var container = document.getElementById("tableContainer");
            container.innerHTML = "";

            if (!data || data.length === 0) {
                container.innerHTML = "<p style='color:#999;padding:20px 0;'>暂无匹配的记录</p>";
                document.getElementById("filterStats").textContent = "共 0 条";
                return;
            }

            var table = document.createElement("table");
            table.border = "1";
            table.style.width = "100%";

            // 表头
            var thead = table.createTHead();
            var headerRow = thead.insertRow();
            ["模式", "结果", "时间"].forEach(function(headerText) {
                var th = document.createElement("th");
                th.textContent = headerText;
                headerRow.appendChild(th);
            });

            // 数据行
            var tbody = table.createTBody();
            data.forEach(function(item) {
                var row = tbody.insertRow();
                [item.模式, item.结果, item.时间].forEach(function(value) {
                    var cell = row.insertCell();
                    cell.textContent = value || "-";
                });
            });

            container.appendChild(table);
            document.getElementById("filterStats").textContent = "共 " + data.length + " 条";
        }

        // ===== 新增：初始化模式下拉选项（只保留模式） =====
        function initFilterOptions() {
            var modeSet = new Set();
            allData.forEach(function(item) {
                if (item.模式) modeSet.add(item.模式);
            });

            var modeSelect = document.getElementById("filterMode");
            modeSelect.innerHTML = '<option value="">全部</option>';

            var sortedModes = Array.from(modeSet).sort();
            sortedModes.forEach(function(m) {
                var opt = document.createElement("option");
                opt.value = m;
                opt.textContent = m;
                modeSelect.appendChild(opt);
            });
        }

        // ===== 新增：计算并更新胜率 =====
        function updateShenglv(mode) {
            var data = allData;
            if (mode !== "") {
                data = data.filter(function(item) {
                    return item.模式 === mode;
                });
            }
            var total = data.length;
            var win = data.filter(function(item) {
                return item.结果 === "胜";
            }).length;
            var rate = total === 0 ? 0 : (win / total * 100);
            var modeDisplay = mode === "" ? "全部" : mode;
            document.getElementById("shenglv").textContent =
                "当前模式胜率: " + rate.toFixed(1) + "% (" + win + "/" + total + ")";
        }

        // ===== 新增：统一更新显示（筛选 + 表格 + 胜率） =====
        function updateDisplay() {
            var mode = document.getElementById("filterMode").value;

            // 筛选数据
            filteredData = allData.filter(function(item) {
                return mode === "" || item.模式 === mode;
            });

            // 渲染表格
            renderTable(filteredData);

            // 更新胜率
            updateShenglv(mode);
        }

        // ===== 改造后的 cjbg（保持原有统计信息显示，增加筛选初始化） =====
        function cjbg() {
            // 1. 更新统计信息（原有逻辑）
            document.getElementById("sjjjj").textContent = '总局数' + zong1 + '局,你赢了' + ying1 + '局，共重置' + cz1 + '次';

            // 2. 读取数据（原有逻辑）
            allData = JSON.parse(localStorage.getItem('lsjlbg1')) || [];

            // 3. 初始化下拉选项
            initFilterOptions();

            // 4. 默认显示全部数据
            filteredData = allData.slice();
            renderTable(filteredData);

            // 5. 更新胜率
            updateShenglv("");
        }

        // ===== 页面加载时执行 =====
        window.onload = cjbg;

        // ===== 新增：模式下拉框变化时自动更新 =====
        document.getElementById('filterMode').addEventListener('change', updateDisplay);
    </script>
</body>
</html>
